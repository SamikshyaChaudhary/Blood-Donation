<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JeevanConnect - Dashboard</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="changepassword.css">
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="logo">
            <i class="fa-solid fa-droplet"></i>
            <span>JeevanConnect</span>
        </div>

        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="aboutus.html">About Us</a>
            <a href="findDonor.html">Find Donors</a>
            <!-- <a href="requestBlood.html">Request Blood</a> -->
            <a href="becomeDonor.html">Become a Donor</a>
            <a href="contactus.html">Contact Us</a>
        </nav>

        <div class="profile-circle">
            AS
        </div>

    </header>

    <!-- ================= MAIN ================= -->

    <div class="container">

        <!-- Sidebar -->

        <aside class="sidebar">

            <h4>DONOR PANEL</h4>

            <ul>

                <li>
                    <a href="dashboard.html">
                        <i class="fa-solid fa-table-columns"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="myprofile.html">
                        <i class="fa-regular fa-user"></i>
                        My Profile
                    </a>
                </li>

                <!-- <li>
                    <a href="myrequests.html">
                        <i class="fa-solid fa-bars"></i>
                        My Requests
                    </a>
                </li> -->

                <li>
                    <a href="mydonations.html">
                        <i class="fa-regular fa-heart"></i>
                        My Donations
                    </a>
                </li>

                <li class="active">
                    <a href="changepassword.html">
                        <i class="fa-solid fa-lock"></i>
                        Change Password
                    </a>
                </li>

            </ul>

             <div class="logout">
                <a href="#" id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </a>
            </div>

        </aside>


        <!-- Content -->

        <main class="content">

            <div class="heading">

                <h1>Change Password</h1>

                <p>Keep your account secure with a strong password.</p>

            </div>


            <!-- Password Card -->

            <div class="password-card">

                <form>

                    <div class="form-group">

                        <label>Current Password</label>

                        <input type="password" placeholder="Enter current password">

                    </div>


                    <div class="form-group">

                        <label>New Password</label>

                        <input type="password" id="password" placeholder="Enter new password">

                    </div>


                    <!-- Password Strength -->

                    <div class="strength">

                        <div class="strength-bar">

                            <div id="strength-fill"></div>

                        </div>

                        <small id="strength-text">
                            Password strength
                        </small>

                    </div>


                    <div class="form-group">

                        <label>Confirm New Password</label>

                        <input type="password" placeholder="Re-enter new password">

                    </div>


                    <button type="submit">

                        Update Password

                    </button>

                </form>

            </div>

        </main>

    </div>
  <!-- Logout Confirmation Modal -->
    <div class="modal" id="logoutModal">

        <div class="modal-content">

            <div class="modal-icon">
                <i class="fa-solid fa-right-from-bracket"></i>
            </div>

            <h2>Logout</h2>

            <p>
                Are you sure you want to logout?
            </p>

            <div class="modal-buttons">

                <button id="cancelLogout" class="cancel-btn">
                    Cancel
                </button>

                <button id="confirmLogout" class="logout-btn">
                    Logout
                </button>

            </div>

        </div>

    </div>
    <script src="script.js"></script>
    <script src="logout.js"></script>

</body>

</html>
