<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | JeevanConnect</title>

    <link rel="stylesheet" href="changepassword.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->

<header class="navbar">

    <div class="logo">
        <i class="fa-solid fa-droplet"></i>
        <span>JeevanConnect</span>
    </div>

    <nav>

        <ul>

            <li><a href="home.html">Home</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="findDonor.html">Find Donors</a></li>
            <li><a href="requestBlood.html">Request Blood</a></li>
            <li><a href="becomeDonor.html">Become a Donor</a></li>
            <li><a href="contactus.html">Contact Us</a></li>

        </ul>

    </nav>

    <div class="avatar">
        AS
    </div>

</header>

<!-- ================= MAIN ================= -->

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h4>DONOR PANEL</h4>

        <ul>

            <li>
                <a href="dashboard.html">
                  <i class="fa-solid fa-table-columns"></i>
                  Dashboard
                </a>
            </li>

            <li>
                <a href="myprofile.html">
                  <i class="fa-solid fa-user"></i>
                  My Profile
                </a>
            </li>

            <li>
                <a href="myrequests.html">
                   <i class="fa-solid fa-bars"></i>
                   My Requests
                </a>
            </li>

            <li>
                <a href="mydonations.html">
                   <i class="fa-solid fa-heart"></i>
                 My Donations
                </a>
            </li>

            <li class="active">
                <a href="changepassword.html">
                   <i class="fa-solid fa-lock"></i>
                   Change Password
                </a>
            </li>

        </ul>

        <div class="logout">
            <a href="login.html">
              <i class="fa-solid fa-right-from-bracket"></i>
              Logout
            </a>
        </div>

    </aside>


    <!-- Content -->

    <main class="content">

        <div class="heading">

            <h1>Change Password</h1>

            <p>Keep your account secure with a strong password.</p>

        </div>


        <!-- Password Card -->

        <div class="password-card">

            <form>

                <div class="form-group">

                    <label>Current Password</label>

                    <input
                        type="password"
                        placeholder="Enter current password">

                </div>


                <div class="form-group">

                    <label>New Password</label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter new password">

                </div>


                <!-- Password Strength -->

                <div class="strength">

                    <div class="strength-bar">

                        <div id="strength-fill"></div>

                    </div>

                    <small id="strength-text">
                        Password strength
                    </small>

                </div>


                <div class="form-group">

                    <label>Confirm New Password</label>

                    <input
                        type="password"
                        placeholder="Re-enter new password">

                </div>


                <button type="submit">

                    Update Password

                </button>

            </form>

        </div>

    </main>

</div>

<script src="change_password.js"></script>

</body>
</html>
