</head>

<body>

<!-- ================= NAVBAR ================= -->

<header class="navbar">

    <div class="logo">
        <i class="fa-solid fa-droplet"></i>
        <span>JeevanConnect</span>

    <nav>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="findonor.html">Find Donors</a></li>
            <li><a href="requestblood.html">Request Blood</a></li>
            <li><a href="becomeadonor.html">Become a Donor</a></li>
            <li><a href="contactus.html">Contact Us</a></li>
        </ul>
    </nav>

    <div class="avatar">
        AS
    </div>

</header>

<!-- ================= MAIN ================= -->

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h4>DONOR PANEL</h4>

        <ul>

            <li>
                <a href="dashboard.html">
                  <i class="fa-solid fa-table-columns"></i>
                  Dashboard
                </a>
            </li>

            <li>
                <a href="myprofile.html">
                  <i class="fa-solid fa-user"></i>
                  My Profile
                </a>
            </li>

            <li>
                <a href="myrequest.html">
                   <i class="fa-solid fa-bars"></i>
                   My Requests
                </a>
            </li>

            <li>
                <a href="mydonations.html">
                   <i class="fa-solid fa-heart"></i>
                   My Donations
                </a>
            </li>

            <li>
                <a href="changepassword.html">
                  <i class="fa-solid fa-lock"></i>
                  Change Password
                </a>
            </li>

        </ul>

        <!-- Logout Button -->
        <div class="logout" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </div>

    </aside>

    

<!-- ================= LOGOUT MODAL ================= -->

<div class="modal" id="logoutModal">

    <div class="modal-box">

        <div class="modal-icon">

            <i class="fa-solid fa-power-off"></i>

        </div>

        <h2>Log out of JeevanConnect?</h2>

        <p>
            You'll need to sign in again to access your donor dashboard.
        </p>

        <div class="modal-buttons">

            <button class="cancel-btn" id="cancelBtn">
                Cancel
            </button>

            <button class="logout-confirm" id="confirmLogout">
                Logout
            </button>

        </div>

    </div>

</div>

<script src="logout.js"></script>

</body>
